<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/><stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="metal1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B82F6"/><stop offset="0.5" stop-color="#1F5FA8"/><stop offset="1" stop-color="#0B4F7A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#g1)"/>
  <!-- pipe left -->
  <rect x="0" y="115" width="80" height="36" fill="#CBD5E1" stroke="#1F5FA8" stroke-width="1.2"/>
  <!-- left flange -->
  <rect x="80" y="95" width="14" height="76" fill="url(#metal1)" stroke="#0B4F7A" stroke-width="1.5"/>
  <circle cx="87" cy="105" r="2.5" fill="#0B4F7A"/>
  <circle cx="87" cy="160" r="2.5" fill="#0B4F7A"/>
  <!-- valve body -->
  <rect x="94" y="80" width="180" height="106" rx="4" fill="url(#metal1)" stroke="#0B4F7A" stroke-width="1.8"/>
  <!-- center seam -->
  <line x1="184" y1="80" x2="184" y2="186" stroke="#0B4F7A" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- bolts on body -->
  <g fill="#0F172A">
    <circle cx="120" cy="92" r="3"/><circle cx="160" cy="92" r="3"/>
    <circle cx="208" cy="92" r="3"/><circle cx="248" cy="92" r="3"/>
    <circle cx="120" cy="174" r="3"/><circle cx="160" cy="174" r="3"/>
    <circle cx="208" cy="174" r="3"/><circle cx="248" cy="174" r="3"/>
  </g>
  <!-- ball indicator (visible through cutaway) -->
  <circle cx="184" cy="133" r="22" fill="#94A3B8" stroke="#0B4F7A" stroke-width="1.5"/>
  <ellipse cx="184" cy="133" rx="22" ry="8" fill="#1F5FA8" opacity="0.6"/>
  <!-- right flange -->
  <rect x="274" y="95" width="14" height="76" fill="url(#metal1)" stroke="#0B4F7A" stroke-width="1.5"/>
  <circle cx="281" cy="105" r="2.5" fill="#0B4F7A"/>
  <circle cx="281" cy="160" r="2.5" fill="#0B4F7A"/>
  <!-- pipe right -->
  <rect x="288" y="115" width="112" height="36" fill="#CBD5E1" stroke="#1F5FA8" stroke-width="1.2"/>
  <!-- stem -->
  <rect x="180" y="50" width="8" height="32" fill="#0B4F7A"/>
  <!-- lever handle -->
  <rect x="140" y="38" width="100" height="14" rx="3" fill="#FCD34D" stroke="#92400E" stroke-width="1.5"/>
  <circle cx="184" cy="45" r="6" fill="#0B4F7A"/>
  <!-- ANSI marking -->
  <text x="184" y="220" text-anchor="middle" fill="#0B4F7A" font-family="monospace" font-size="11" font-weight="700">ANSI B16.34 · CLASS 150</text>
</svg>